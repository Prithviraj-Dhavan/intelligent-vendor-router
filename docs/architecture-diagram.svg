<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4FD1C5"/>
    </marker>
  </defs>
  <rect width="1000" height="620" fill="#0B0F14"/>

  <text x="30" y="40" fill="#E8EDF2" font-size="20" font-weight="700">Intelligent Vendor Routing Platform — Architecture</text>
  <text x="30" y="62" fill="#7A8C9C" font-size="12">Client → Unified API → Routing Engine → Vendor(s) → Standardized Response</text>

  <!-- Client -->
  <rect x="30" y="120" width="140" height="70" rx="8" fill="#151D27" stroke="#22303C"/>
  <text x="100" y="150" fill="#E8EDF2" font-size="13" text-anchor="middle">Client</text>
  <text x="100" y="168" fill="#7A8C9C" font-size="10" text-anchor="middle">(any consumer app)</text>

  <!-- API layer -->
  <rect x="230" y="100" width="180" height="110" rx="8" fill="#151D27" stroke="#4FD1C5" stroke-width="1.5"/>
  <text x="320" y="128" fill="#4FD1C5" font-size="13" text-anchor="middle" font-weight="700">Unified API</text>
  <text x="320" y="148" fill="#9FB0BE" font-size="10" text-anchor="middle">POST /route</text>
  <text x="320" y="163" fill="#9FB0BE" font-size="10" text-anchor="middle">POST /vendors · GET /vendors</text>
  <text x="320" y="178" fill="#9FB0BE" font-size="10" text-anchor="middle">GET /vendor-metrics</text>
  <text x="320" y="193" fill="#9FB0BE" font-size="10" text-anchor="middle">GET /routing-logs · GET /health</text>

  <!-- Routing engine -->
  <rect x="460" y="80" width="220" height="150" rx="8" fill="#151D27" stroke="#22303C"/>
  <text x="570" y="106" fill="#E8EDF2" font-size="13" text-anchor="middle" font-weight="700">Routing Engine</text>
  <text x="570" y="128" fill="#7A8C9C" font-size="10" text-anchor="middle">1. Filter eligible vendors</text>
  <text x="570" y="144" fill="#7A8C9C" font-size="10" text-anchor="middle">(health, rate limit, features, latency)</text>
  <text x="570" y="164" fill="#7A8C9C" font-size="10" text-anchor="middle">2. Apply routing strategy</text>
  <text x="570" y="180" fill="#7A8C9C" font-size="10" text-anchor="middle">priority / weighted / lowest-latency /</text>
  <text x="570" y="195" fill="#7A8C9C" font-size="10" text-anchor="middle">lowest-cost / failover / round-robin /</text>
  <text x="570" y="210" fill="#7A8C9C" font-size="10" text-anchor="middle">feature-based / health-based</text>

  <!-- Vendor Store / Metrics -->
  <rect x="460" y="250" width="220" height="90" rx="8" fill="#151D27" stroke="#22303C"/>
  <text x="570" y="275" fill="#E8EDF2" font-size="12" text-anchor="middle" font-weight="700">Vendor Registry + Metrics Store</text>
  <text x="570" y="295" fill="#7A8C9C" font-size="10" text-anchor="middle">latency window · success/error rate</text>
  <text x="570" y="310" fill="#7A8C9C" font-size="10" text-anchor="middle">rate-limit counters · health status</text>
  <text x="570" y="325" fill="#7A8C9C" font-size="10" text-anchor="middle">(in-memory; swappable for Redis/DB)</text>

  <!-- Routing logs -->
  <rect x="460" y="360" width="220" height="70" rx="8" fill="#151D27" stroke="#22303C"/>
  <text x="570" y="385" fill="#E8EDF2" font-size="12" text-anchor="middle" font-weight="700">Routing Logs</text>
  <text x="570" y="405" fill="#7A8C9C" font-size="10" text-anchor="middle">decision + candidates + reason</text>
  <text x="570" y="418" fill="#7A8C9C" font-size="10" text-anchor="middle">audit trail for every request</text>

  <!-- Vendors -->
  <rect x="750" y="60" width="200" height="55" rx="8" fill="#151D27" stroke="#3FB68B"/>
  <text x="850" y="82" fill="#3FB68B" font-size="12" text-anchor="middle" font-weight="700">Vendor A</text>
  <text x="850" y="98" fill="#7A8C9C" font-size="9" text-anchor="middle">priority 1 · ₹1.5 · 2000ms</text>

  <rect x="750" y="130" width="200" height="55" rx="8" fill="#151D27" stroke="#E8A33D"/>
  <text x="850" y="152" fill="#E8A33D" font-size="12" text-anchor="middle" font-weight="700">Vendor B</text>
  <text x="850" y="168" fill="#7A8C9C" font-size="9" text-anchor="middle">priority 2 · ₹1.2 · 3000ms</text>

  <rect x="750" y="200" width="200" height="55" rx="8" fill="#151D27" stroke="#22303C"/>
  <text x="850" y="222" fill="#9FB0BE" font-size="12" text-anchor="middle" font-weight="700">Vendor C ...N</text>
  <text x="850" y="238" fill="#7A8C9C" font-size="9" text-anchor="middle">additional vendors, any capability</text>

  <!-- Bonus: AI Agent -->
  <rect x="750" y="290" width="200" height="140" rx="8" fill="#151D27" stroke="#E8A33D" stroke-width="1.5"/>
  <text x="850" y="315" fill="#E8A33D" font-size="12" text-anchor="middle" font-weight="700">Agentic AI Layer (bonus)</text>
  <text x="850" y="336" fill="#9FB0BE" font-size="9" text-anchor="middle">POST /ai/generate-config</text>
  <text x="850" y="351" fill="#9FB0BE" font-size="9" text-anchor="middle">GET  /ai/explain/:logId</text>
  <text x="850" y="366" fill="#9FB0BE" font-size="9" text-anchor="middle">POST /ai/recommend-strategy</text>
  <text x="850" y="386" fill="#7A8C9C" font-size="9" text-anchor="middle">Grok API (grok-4.3) when</text>
  <text x="850" y="400" fill="#7A8C9C" font-size="9" text-anchor="middle">XAI_API_KEY is set,</text>
  <text x="850" y="414" fill="#7A8C9C" font-size="9" text-anchor="middle">else rule-based fallback</text>

  <!-- Frontend -->
  <rect x="230" y="470" width="450" height="90" rx="8" fill="#151D27" stroke="#22303C"/>
  <text x="455" y="497" fill="#E8EDF2" font-size="12" text-anchor="middle" font-weight="700">Static Dashboard (frontend/)</text>
  <text x="455" y="518" fill="#7A8C9C" font-size="10" text-anchor="middle">Vendor registry · Route tester with live signal-path animation</text>
  <text x="455" y="533" fill="#7A8C9C" font-size="10" text-anchor="middle">Metrics rail · Routing log terminal · AI assistant panel</text>
  <text x="455" y="548" fill="#7A8C9C" font-size="10" text-anchor="middle">Served by the same Express app on port 3000</text>

  <!-- Arrows -->
  <line x1="170" y1="155" x2="228" y2="155" stroke="#4FD1C5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="410" y1="150" x2="458" y2="150" stroke="#4FD1C5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="230" x2="570" y2="248" stroke="#22303C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="340" x2="570" y2="358" stroke="#22303C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="680" y1="130" x2="748" y2="90" stroke="#3FB68B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="680" y1="160" x2="748" y2="158" stroke="#E8A33D" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="680" y1="190" x2="748" y2="225" stroke="#22303C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="682" y1="200" x2="748" y2="340" stroke="#E8A33D" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
  <line x1="455" y1="230" x2="455" y2="468" stroke="#22303C" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="475" y="350" fill="#54626F" font-size="9">dashboard calls same API</text>

  <text x="30" y="600" fill="#54626F" font-size="10">Legend: solid teal = primary request path · dashed amber = AI agent (optional, bonus) · dashed grey = UI ↔ API</text>
</svg>
